
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FocusOS Landing</title>

<!-- Tailwind CDN -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- React + ReactDOM -->
<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

<!-- Framer Motion -->
<script src="https://unpkg.com/framer-motion/dist/framer-motion.umd.js"></script>

<!-- Babel for JSX -->
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
body{
  margin:0;
  font-family: Inter, -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
  background:#F2F2F5;
}
</style>
</head>

<body>

<div id="root"></div>

<script type="text/babel">

const { motion } = window["framer-motion"];

function FocusOSLandingPage(){

  const screenshots = [
    { title:"실시간 집중 보드", desc:"내가 참여 중인 세션과 지금 참여 중인 사람들을 한눈에 확인", type:"board"},
    { title:"응원 한마디 채팅", desc:"빠른 응원 버튼과 댓글로 함께 집중하는 분위기를 만듦", type:"chat"},
    { title:"FocusOS LIVE 입장", desc:"라이브 집중방에서 바로 나도 집중 시작하기", type:"live"}
  ];

  const fadeUp = {
    initial:{opacity:0,y:24},
    whileInView:{opacity:1,y:0},
    transition:{duration:.6}
  };

  return (
  <div className="min-h-screen bg-[#F2F2F5] text-[#111]">

    {/* HERO */}
    <section className="max-w-6xl mx-auto px-6 pt-24 pb-32">

      <div className="flex items-center gap-3 mb-6">
        <div className="h-10 w-10 rounded-xl flex items-center justify-center text-white font-bold bg-gradient-to-r from-[#7B5CFF] to-[#9C7CFF]">F</div>
        <div className="text-xl font-semibold text-[#7B5CFF]">FocusOS</div>
      </div>

      <div className="inline-flex items-center gap-2 bg-white px-4 py-2 rounded-full shadow text-sm mb-6">
        <div className="h-2 w-2 bg-[#7B5CFF] rounded-full"></div>
        Live focus community
      </div>

      <h1 className="text-4xl md:text-6xl font-semibold tracking-[-0.04em] leading-[1.05]">
        시작이 어려운 순간을 위한<br/>
        <span className="bg-gradient-to-r from-[#7B5CFF] to-[#9C7CFF] bg-clip-text text-transparent">
          라이브 집중 시작 환경
        </span>
      </h1>

      <p className="mt-6 text-black/60 max-w-xl leading-8">
      FocusOS는 단순한 생산성 앱이 아니라, 함께 있는 분위기 속에서 다시 시작하게 만드는 집중 커뮤니티입니다.
      라이브 집중방, 5분 스타트, 응원 채팅, 집중 리포트가 하나의 흐름으로 자연스럽게 이어집니다.
      </p>

      <div className="flex gap-4 mt-8">
        <a href="https://focusos-fawn.vercel.app" className="px-7 py-3 rounded-xl text-white bg-gradient-to-r from-[#7B5CFF] to-[#9C7CFF]">
        라이브 참여하기 →
        </a>

        <a href="https://focusos-fawn.vercel.app" className="px-7 py-3 rounded-xl border bg-white">
        앱 미리보기
        </a>
      </div>

    </section>

    {/* APP PREVIEW */}
    <section className="max-w-6xl mx-auto px-6 pb-24">

      <h2 className="text-4xl font-semibold mb-12">앱 미리보기</h2>

      <div className="flex gap-6 overflow-x-auto">

        {screenshots.map((item,i)=>(
          <motion.div key={i} {...fadeUp} className="min-w-[280px] bg-white rounded-3xl p-6 shadow">
            <div className="h-[320px] bg-[#F5F5F7] rounded-xl flex items-center justify-center text-black/40">
              App UI
            </div>
            <h3 className="mt-4 font-semibold">{item.title}</h3>
            <p className="text-sm text-black/60 mt-1">{item.desc}</p>
          </motion.div>
        ))}

      </div>

    </section>

    {/* CTA */}
    <section className="max-w-5xl mx-auto px-6 pb-32 text-center">

      <div className="bg-gradient-to-r from-[#7B5CFF] to-[#9C7CFF] text-white p-12 rounded-3xl">

        <h2 className="text-4xl font-semibold">
          지금 함께 집중하세요
        </h2>

        <p className="mt-4 text-white/90">
          혼자 하지 않아도 됩니다. FocusOS 커뮤니티에 들어오면 다시 시작할 수 있습니다.
        </p>

        <a href="https://focusos-fawn.vercel.app" className="inline-block mt-8 bg-white text-black px-8 py-3 rounded-xl">
        FocusOS 시작하기 →
        </a>

      </div>

    </section>

  </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<FocusOSLandingPage/>);

</script>

</body>
</html>
